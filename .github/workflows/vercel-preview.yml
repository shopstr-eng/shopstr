name: Vercel Preview Deployment

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  vercel-precheck:
    name: Vercel Secrets Precheck
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.precheck.outputs.can_deploy }}
    steps:
      - name: Check required Vercel secrets
        id: precheck
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ] && [ -n "${{ secrets.VERCEL_ORG_ID }}" ] && [ -n "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Vercel secrets are missing; preview deployment will be skipped." >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy-preview:
    name: Deploy Preview to Vercel
    needs: vercel-precheck
    if: needs.vercel-precheck.outputs.can_deploy == 'true'
    runs-on: ubuntu-latest
    
    # Add manual approval requirement for external PRs
    environment: 
      name: preview-deployment
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          # For pull_request_target, we need to checkout the PR branch
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Deploy to Vercel
        id: vercel_deploy
        continue-on-error: true
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-comment: true
          alias-domains: |
            shopstr-pr-${{ github.event.number }}.vercel.app

      - name: Record non-blocking deployment failure
        if: steps.vercel_deploy.outcome == 'failure'
        run: |
          echo "Vercel preview deployment failed, but this workflow is non-blocking by design." >> "$GITHUB_STEP_SUMMARY"