name: Test Suite

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Run green Jest subset
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: >
          npm test -- --ci
          --testPathIgnorePatterns=__tests__/api/nostr/verify-nip05.test.ts
          --testPathIgnorePatterns=pages/api/db/__tests__/update-order-status.test.ts
          --testPathIgnorePatterns=components/utility-components/__tests__/product-card.test.tsx
          --testPathIgnorePatterns=components/settings/__tests__/user-profile-form.test.tsx
